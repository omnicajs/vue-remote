name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-22.04

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Run actionlint
        run: make actionlint

  eslint:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-eslint

      - name: Run lint
        run: yarn lint

  tests:
    needs: [ actionlint, eslint ]

    timeout-minutes: 60
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-unit-integration

      - name: Run tests
        run: yarn test

  e2e:
    needs: [ tests ]

    timeout-minutes: 60
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-e2e

      - name: Install Playwright Browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Run browser e2e tests (Vitest + Playwright)
        run: yarn test:e2e

  coverage:
    needs: [ tests, e2e ]

    timeout-minutes: 90
    runs-on: ubuntu-22.04

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.x
          cache-key-suffix: coverage-merged

      - name: Install Playwright Browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Build merged coverage report
        run: yarn test:all:coverage

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged-24.x
          path: coverage/
          retention-days: 30

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true
