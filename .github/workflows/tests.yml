name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-22.04

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1

  eslint:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-eslint

      - name: Run lint
        run: yarn lint

  tests:
    needs: [ actionlint, eslint ]

    timeout-minutes: 60
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-unit-integration

      - name: Run tests
        run: yarn test:coverage

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == '24.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json

  e2e:
    needs: [ tests ]

    timeout-minutes: 60
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-e2e

      - name: Install Playwright Browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Build e2e example app
        run: yarn e2e:build

      - name: Run example app server
        run: nohup yarn e2e:serve &

      - name: Run e2e tests
        run: yarn e2e:test

      - name: Upload coverage to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-${{ matrix.node-version }}
          path: coverage/

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == '24.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30
